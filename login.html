<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Required for Google Sign-In popup to work correctly -->
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups">
  <meta name="referrer" content="no-referrer">
  <title>Sign In — SPACEMAN3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="js/config.js"></script>
  <style>
    :root {
      --color-bg-deep:      #08080F;
      --color-bg-surface:   #0F1020;
      --color-bg-raised:    #161830;
      --color-blue-500:     #2979FF;
      --color-blue-400:     #5B9BFF;
      --color-blue-300:     #90BAFF;
      --color-blue-600:     #1565C0;
      --color-white:        #FFFFFF;
      --color-fg1:          #E8EDF5;
      --color-fg2:          #B0BBCC;
      --color-fg3:          #8892A4;
      --color-border:       #1E2040;
      --color-border-strong:#262850;
      --color-error:        #FF4D6A;
      --color-success:      #22D3A4;
      --glow-md:            0 0 24px rgba(41,121,255,0.35);
      --font-display:       'Orbitron', sans-serif;
      --font-body:          'Inter', sans-serif;
      --radius-sm:          6px;
      --radius-md:          12px;
      --radius-full:        9999px;
      --transition-fast:    150ms ease-out;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100vh; }
    body {
      background: var(--color-bg-deep);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow: hidden;
    }

    /* Stars background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1.5px 1.5px at 50% 70%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 10% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 35% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 75% 40%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 25% 60%, rgba(255,255,255,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb behind card */
    body::after {
      content: '';
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse at center, rgba(41,121,255,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── CARD ── */
    .card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-strong);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 0 40px rgba(41,121,255,0.1), 0 24px 48px rgba(0,0,0,0.6);
    }

    /* ── LOGO ── */
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      text-decoration: none;
    }
    .logo img { width: 32px; height: 32px; filter: drop-shadow(0 0 8px rgba(41,121,255,0.5)); }
    .logo-text {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 800;
      color: var(--color-white);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .logo-text span { color: var(--color-blue-500); }

    /* ── HEADING ── */
    h1 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      color: var(--color-fg1);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 14px;
      color: var(--color-fg3);
      margin-bottom: 28px;
    }

    /* ── GOOGLE BUTTON ── */
    .btn-google {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 12px 20px;
      background: var(--color-bg-raised);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      color: var(--color-fg1);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color var(--transition-fast), background var(--transition-fast);
      margin-bottom: 20px;
    }
    .btn-google:hover {
      border-color: var(--color-blue-500);
      background: rgba(41,121,255,0.06);
    }
    .btn-google svg { flex-shrink: 0; }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }
    .divider span { font-size: 12px; color: var(--color-fg3); white-space: nowrap; }

    /* ── FORM ── */
    .form-row { margin-bottom: 14px; }
    .form-row-split { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-fg3);
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      background: var(--color-bg-raised);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-sm);
      color: var(--color-fg1);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      transition: border-color var(--transition-fast);
      -webkit-appearance: none;
    }
    select { cursor: pointer; }
    input:focus, select:focus { border-color: var(--color-blue-500); }
    input::placeholder { color: var(--color-fg3); }

    /* ── PRIMARY BUTTON ── */
    .btn-primary {
      width: 100%;
      padding: 13px 20px;
      background: var(--color-blue-500);
      border: none;
      border-radius: var(--radius-md);
      color: var(--color-white);
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--transition-fast), box-shadow var(--transition-fast);
      margin-top: 6px;
    }
    .btn-primary:hover { background: var(--color-blue-400); box-shadow: var(--glow-md); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── TOGGLE LINK ── */
    .toggle-link {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--color-fg3);
    }
    .toggle-link button {
      background: none;
      border: none;
      color: var(--color-blue-400);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── ERROR / SUCCESS ALERTS ── */
    .alert {
      display: none;
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .alert.visible { display: block; }
    .alert-error { background: rgba(255,77,106,0.12); border: 1px solid rgba(255,77,106,0.3); color: #FF8FA3; }
    .alert-success { background: rgba(34,211,164,0.1); border: 1px solid rgba(34,211,164,0.25); color: var(--color-success); }
    .alert-action {
      margin-top: 8px;
    }
    .alert-action button {
      background: none;
      border: none;
      color: var(--color-blue-400);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      padding: 0;
      text-decoration: underline;
      text-underline-offset: 2px;
    }

    /* ── FORGOT PASSWORD ── */
    .forgot-link {
      display: block;
      text-align: right;
      font-size: 12px;
      color: var(--color-fg3);
      background: none;
      border: none;
      cursor: pointer;
      margin-top: -6px;
      margin-bottom: 14px;
      padding: 0;
    }
    .forgot-link:hover { color: var(--color-blue-400); }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="card">
  <a href="/" class="logo">
    <img src="assets/spaceman-logo.png" alt="Spaceman3D">
    <span class="logo-text">SPACEMAN<span>3D</span></span>
  </a>

  <h1 id="page-title">Welcome Back</h1>
  <p class="subtitle" id="page-subtitle">Sign in to your Spaceman3D account.</p>

  <!-- Alert area -->
  <div class="alert" id="alert"></div>

  <!-- Google Sign-In -->
  <button class="btn-google" id="btn-google" type="button">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
      <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
      <path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
      <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 6.293C4.672 4.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="divider"><span>or continue with email</span></div>

  <!-- Sign-up fields (hidden by default) -->
  <div id="signup-fields" style="display:none">
    <div class="form-row-split">
      <div>
        <label for="firstName">First name</label>
        <input type="text" id="firstName" placeholder="Jane" autocomplete="given-name">
      </div>
      <div>
        <label for="lastName">Last name</label>
        <input type="text" id="lastName" placeholder="Doe" autocomplete="family-name">
      </div>
    </div>
    <div class="form-row-split">
      <div>
        <label for="country">Country</label>
        <select id="country">
          <option value="">Select…</option>
          <option value="US">United States</option>
          <option value="CA">Canada</option>
          <option value="GB">United Kingdom</option>
          <option value="AU">Australia</option>
          <option value="DE">Germany</option>
          <option value="FR">France</option>
          <option value="JP">Japan</option>
          <option value="OTHER">Other</option>
        </select>
      </div>
      <div>
        <label for="state">State / Province</label>
        <input type="text" id="state" placeholder="CA" autocomplete="address-level1">
      </div>
    </div>
  </div>

  <!-- Email / Password -->
  <div class="form-row">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
  </div>
  <div class="form-row">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="forgot-link" id="btn-forgot" type="button">Forgot password?</button>

  <button class="btn-primary" id="btn-submit" type="button">Sign In</button>

  <div class="toggle-link">
    <span id="toggle-text">Don't have an account?</span>
    <button id="btn-toggle" type="button">Sign up free</button>
  </div>
</div>

<!-- Google Identity Services -->
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
(function () {
  const API_URL = window.SM3D_CONFIG?.API_URL || 'https://api.spaceman3d.com';
  const GOOGLE_CLIENT_ID = window.SM3D_CONFIG?.GOOGLE_CLIENT_ID || '';

  const ALLOWED_REDIRECT_ORIGINS = [
    'https://spaceman3d.com',
    'https://www.spaceman3d.com',
    'https://cookie.spaceman3d.com',
    'https://terrain3d.spaceman3d.com',
  ];

  // Explicit local origins — never allow arbitrary localhost ports in dev
  const LOCAL_ORIGINS = [
    'http://localhost:5173',  // Cookie Cutter
    'http://localhost:5174',  // Terrain3D
    'http://localhost:8080',  // Main site
  ];
  const IS_LOCAL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

  function isSafeRedirect(url) {
    try {
      const parsed = new URL(url);
      if (IS_LOCAL) return LOCAL_ORIGINS.includes(parsed.origin);
      return ALLOWED_REDIRECT_ORIGINS.some((o) => parsed.origin === o);
    } catch { return false; }
  }

  // Read ?redirect= param
  const params = new URLSearchParams(window.location.search);
  const redirectUrl = params.get('redirect') || null;

  let isSignUp = false;

  // ── DOM refs ──────────────────────────────────────
  const title       = document.getElementById('page-title');
  const subtitle    = document.getElementById('page-subtitle');
  const alert       = document.getElementById('alert');
  const btnGoogle   = document.getElementById('btn-google');
  const signupFields = document.getElementById('signup-fields');
  const emailInput  = document.getElementById('email');
  const passwordInput = document.getElementById('password');
  const forgotBtn   = document.getElementById('btn-forgot');
  const submitBtn   = document.getElementById('btn-submit');
  const toggleText  = document.getElementById('toggle-text');
  const toggleBtn   = document.getElementById('btn-toggle');

  // ── Helpers ───────────────────────────────────────
  function showAlert(message, type, actionLabel, actionFn) {
    alert.className = `alert visible alert-${type}`;
    alert.innerHTML = `<div>${message}</div>`;
    if (actionLabel && actionFn) {
      const div = document.createElement('div');
      div.className = 'alert-action';
      const btn = document.createElement('button');
      btn.textContent = actionLabel;
      btn.onclick = actionFn;
      div.appendChild(btn);
      alert.appendChild(div);
    }
  }
  function clearAlert() { alert.className = 'alert'; alert.innerHTML = ''; }

  function setLoading(loading) {
    submitBtn.disabled = loading;
    btnGoogle.disabled = loading;
    submitBtn.innerHTML = loading
      ? '<span class="spinner"></span>Please wait…'
      : (isSignUp ? 'Create Account' : 'Sign In');
  }

  function afterAuth(user, accessToken, refreshToken) {
    localStorage.setItem('access_token', accessToken);
    localStorage.setItem('refresh_token', refreshToken);
    localStorage.setItem('user_id', user.id);

    if (redirectUrl && isSafeRedirect(redirectUrl)) {
      window.location.href =
        `${redirectUrl}#access_token=${encodeURIComponent(accessToken)}&refresh_token=${encodeURIComponent(refreshToken)}&user_id=${encodeURIComponent(user.id)}`;
    } else {
      window.location.href = '/dashboard.html';
    }
  }

  async function handleApiError(res, switchToSignUpFn, switchToSignInFn) {
    let data = {};
    try { data = await res.json(); } catch {}
    const msg = data.error || data.message || 'Something went wrong';

    if (res.status === 409) {
      showAlert('An account with that email already exists.', 'error', 'Sign in instead', switchToSignInFn);
    } else if (res.status === 404) {
      showAlert('No account found with that email.', 'error', 'Sign up for free', switchToSignUpFn);
    } else if (res.status === 401 && msg.includes('Google Sign-In')) {
      showAlert('This account uses Google Sign-In. Please use "Continue with Google" above.', 'error');
    } else if (res.status === 401 && msg.includes('Incorrect password')) {
      showAlert('Incorrect password. Please try again.', 'error');
    } else {
      showAlert(msg, 'error');
    }
  }

  // ── Toggle sign-in / sign-up ──────────────────────
  function showSignIn() {
    isSignUp = false;
    title.textContent = 'Welcome Back';
    subtitle.textContent = 'Sign in to your Spaceman3D account.';
    signupFields.style.display = 'none';
    forgotBtn.style.display = 'block';
    submitBtn.textContent = 'Sign In';
    toggleText.textContent = "Don't have an account?";
    toggleBtn.textContent = 'Sign up free';
    clearAlert();
  }

  function showSignUp() {
    isSignUp = true;
    title.textContent = 'Create Account';
    subtitle.textContent = 'Join Spaceman3D — it\'s free to start.';
    signupFields.style.display = 'block';
    forgotBtn.style.display = 'none';
    submitBtn.textContent = 'Create Account';
    toggleText.textContent = 'Already have an account?';
    toggleBtn.textContent = 'Sign in';
    clearAlert();
  }

  toggleBtn.addEventListener('click', () => isSignUp ? showSignIn() : showSignUp());

  // ── Email/password submit ─────────────────────────
  submitBtn.addEventListener('click', async () => {
    clearAlert();
    const email = emailInput.value.trim();
    const password = passwordInput.value;
    if (!email || !password) { showAlert('Email and password are required.', 'error'); return; }

    setLoading(true);
    try {
      if (isSignUp) {
        // Registration
        const firstName = document.getElementById('firstName').value.trim();
        const lastName  = document.getElementById('lastName').value.trim();
        const country   = document.getElementById('country').value;
        const state     = document.getElementById('state').value.trim();

        const res = await fetch(`${API_URL}/auth/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, firstName, lastName }),
        });
        if (!res.ok) { await handleApiError(res, showSignUp, showSignIn); return; }
        const { user, accessToken, refreshToken } = await res.json();

        // Patch country/state if provided
        if (country || state) {
          try {
            await fetch(`${API_URL}/user/me`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
              body: JSON.stringify({ country, state }),
            });
          } catch {}
        }

        afterAuth(user, accessToken, refreshToken);

      } else {
        // Login
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        if (!res.ok) { await handleApiError(res, showSignUp, showSignIn); return; }
        const { user, accessToken, refreshToken } = await res.json();
        afterAuth(user, accessToken, refreshToken);
      }
    } catch (err) {
      showAlert('Network error. Please try again.', 'error');
    } finally {
      setLoading(false);
    }
  });

  // Allow Enter key to submit
  [emailInput, passwordInput].forEach((el) =>
    el.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitBtn.click(); })
  );

  // ── Forgot password ────────────────────────────────
  forgotBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    if (!email) { showAlert('Enter your email above, then click Forgot password.', 'error'); return; }
    clearAlert();
    try {
      await fetch(`${API_URL}/auth/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      showAlert('If that email exists, a reset link has been sent.', 'success');
    } catch {
      showAlert('Network error. Please try again.', 'error');
    }
  });

  // ── Google Sign-In ────────────────────────────────
  btnGoogle.addEventListener('click', () => {
    if (!GOOGLE_CLIENT_ID) {
      showAlert('Google Sign-In is not configured yet. Please use email/password.', 'error');
      return;
    }
    if (typeof google === 'undefined') {
      showAlert('Google Sign-In script failed to load. Please refresh the page.', 'error');
      return;
    }
    google.accounts.id.initialize({
      client_id: GOOGLE_CLIENT_ID,
      callback: handleGoogleCredential,
    });
    google.accounts.id.prompt();
  });

  async function handleGoogleCredential(response) {
    clearAlert();
    setLoading(true);
    try {
      const res = await fetch(`${API_URL}/auth/google`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken: response.credential }),
      });
      if (!res.ok) {
        let data = {}; try { data = await res.json(); } catch {}
        showAlert(data.error || 'Google sign-in failed.', 'error');
        return;
      }
      const { user, accessToken, refreshToken } = await res.json();
      afterAuth(user, accessToken, refreshToken);
    } catch {
      showAlert('Network error. Please try again.', 'error');
    } finally {
      setLoading(false);
    }
  }

  // Initialize Google Identity Services button (rendered in the background)
  window.addEventListener('load', () => {
    if (GOOGLE_CLIENT_ID && typeof google !== 'undefined') {
      google.accounts.id.initialize({
        client_id: GOOGLE_CLIENT_ID,
        callback: handleGoogleCredential,
      });
    }
  });

  // If already logged in, skip to dashboard
  if (localStorage.getItem('access_token') && !redirectUrl) {
    window.location.href = '/dashboard.html';
  }
})();
</script>
</body>
</html>
