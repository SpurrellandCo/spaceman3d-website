<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Exports — SPACEMAN3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth-nav.js" defer></script>
  <style>
    :root {
      --color-bg-deep:      #08080F;
      --color-bg-surface:   #0F1020;
      --color-bg-raised:    #161830;
      --color-blue-500:     #2979FF;
      --color-blue-400:     #5B9BFF;
      --color-blue-300:     #90BAFF;
      --color-white:        #FFFFFF;
      --color-fg1:          #E8EDF5;
      --color-fg2:          #B0BBCC;
      --color-fg3:          #8892A4;
      --color-border:       #1E2040;
      --color-border-strong:#262850;
      --color-success:      #22D3A4;
      --color-warning:      #FBBF24;
      --color-error:        #FF4D6A;
      --glow-sm:            0 0 12px rgba(41,121,255,0.25);
      --font-display:       'Orbitron', sans-serif;
      --font-body:          'Inter', sans-serif;
      --font-mono:          'Space Mono', monospace;
      --radius-sm:          6px;
      --radius-md:          12px;
      --radius-full:        9999px;
      --transition-fast:    150ms ease-out;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100vh; }
    body {
      background: var(--color-bg-deep);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      color: var(--color-fg1);
    }

    /* ── HEADER ── */
    .header {
      height: 64px;
      background: rgba(8,8,15,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .header-logo img { width: 28px; height: 28px; filter: drop-shadow(0 0 8px rgba(41,121,255,0.5)); }
    .header-wordmark {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 800;
      color: var(--color-white);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .header-wordmark span { color: var(--color-blue-500); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .btn-outline {
      padding: 7px 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border-strong);
      background: transparent;
      color: var(--color-fg2);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color var(--transition-fast), color var(--transition-fast);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-outline:hover { border-color: var(--color-blue-500); color: var(--color-blue-400); }

    /* ── MAIN LAYOUT ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .page-title span { color: var(--color-blue-400); }
    .page-sub { font-size: 14px; color: var(--color-fg3); margin-bottom: 32px; }

    /* ── FILTER BAR ── */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .filter-chip {
      padding: 5px 14px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border-strong);
      background: transparent;
      color: var(--color-fg3);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition-fast);
    }
    .filter-chip:hover { border-color: var(--color-blue-400); color: var(--color-blue-400); }
    .filter-chip.active {
      background: rgba(41,121,255,0.12);
      border-color: rgba(41,121,255,0.4);
      color: var(--color-blue-400);
    }

    /* ── EXPORT GRID ── */
    .export-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .export-card {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      position: relative;
      overflow: hidden;
    }
    .export-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity var(--transition-fast);
    }
    .export-card.app-cookie::before { background: linear-gradient(90deg, #FF6B35, #FF9A3C); }
    .export-card.app-terrain3d::before { background: linear-gradient(90deg, #2979FF, #22D3A4); }
    .export-card:hover { border-color: var(--color-blue-500); box-shadow: var(--glow-sm); }
    .export-card:hover::before { opacity: 1; }

    .export-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .export-app-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      flex-shrink: 0;
    }
    .export-app-badge.app-cookie {
      background: rgba(255,107,53,0.12);
      border: 1px solid rgba(255,107,53,0.3);
      color: #FF9A3C;
    }
    .export-app-badge.app-terrain3d {
      background: rgba(41,121,255,0.12);
      border: 1px solid rgba(41,121,255,0.3);
      color: var(--color-blue-400);
    }
    .export-app-badge.app-unknown {
      background: rgba(136,146,164,0.1);
      border: 1px solid rgba(136,146,164,0.2);
      color: var(--color-fg3);
    }

    .export-status {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .export-status.status-completed { color: var(--color-success); }
    .export-status.status-processing { color: var(--color-warning); }
    .export-status.status-failed { color: var(--color-error); }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
    }
    .status-dot.status-processing { animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

    .export-name {
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 700;
      color: var(--color-fg1);
      letter-spacing: 0.03em;
      word-break: break-word;
    }
    .export-meta {
      font-size: 12px;
      color: var(--color-fg3);
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .export-meta-row { display: flex; align-items: center; gap: 6px; }
    .export-meta-label { color: var(--color-fg3); }
    .export-meta-value { color: var(--color-fg2); font-family: var(--font-mono); font-size: 11px; }

    .export-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }
    .btn-download {
      flex: 1;
      padding: 8px 14px;
      background: var(--color-blue-500);
      border: none;
      border-radius: var(--radius-sm);
      color: var(--color-white);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: background var(--transition-fast);
    }
    .btn-download:hover { background: var(--color-blue-400); }
    .btn-download:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-open {
      flex: 1;
      padding: 8px 14px;
      background: transparent;
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-sm);
      color: var(--color-fg2);
      font-family: var(--font-display);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all var(--transition-fast);
    }
    .btn-open:hover { border-color: var(--color-blue-400); color: var(--color-blue-400); }

    /* ── SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, var(--color-bg-raised) 25%, var(--color-bg-surface) 50%, var(--color-bg-raised) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── EMPTY / ERROR ── */
    .state-panel {
      text-align: center;
      padding: 64px 24px;
      color: var(--color-fg3);
    }
    .state-panel svg {
      width: 40px; height: 40px;
      stroke: var(--color-fg3);
      fill: none;
      stroke-width: 1.5;
      margin: 0 auto 16px;
      display: block;
    }
    .state-panel h3 {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.06em;
      color: var(--color-fg2);
      margin-bottom: 8px;
      text-transform: uppercase;
    }
    .state-panel p { font-size: 14px; }
    .state-panel a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 20px;
      padding: 9px 20px;
      background: rgba(41,121,255,0.1);
      border: 1px solid rgba(41,121,255,0.3);
      border-radius: var(--radius-full);
      color: var(--color-blue-400);
      font-size: 13px;
      font-weight: 600;
      text-decoration: none;
      transition: all var(--transition-fast);
    }
    .state-panel a:hover { background: rgba(41,121,255,0.2); color: #fff; }

    /* ── COUNT BADGE ── */
    .result-count {
      font-size: 13px;
      color: var(--color-fg3);
      margin-bottom: 16px;
    }
    .result-count strong { color: var(--color-fg2); }
  </style>
</head>
<body>

<header class="header">
  <a href="/" class="header-logo">
    <img src="assets/spaceman-helmet.png" alt="SPACEMAN3D">
    <span class="header-wordmark">SPACEMAN<span>3D</span></span>
  </a>
  <div class="header-right">
    <a href="/orders.html" class="btn-outline">Orders</a>
    <a href="/dashboard.html" class="btn-outline">Dashboard</a>
    <div id="auth-nav-slot"></div>
  </div>
</header>

<main class="main">
  <div class="page-title">My <span>Exports</span></div>
  <p class="page-sub">Files and models you've generated across all Spaceman3D apps.</p>

  <div class="filter-bar" id="filterBar">
    <button class="filter-chip active" data-app="all">All Apps</button>
    <button class="filter-chip" data-app="cookie">Cookie Cutter</button>
    <button class="filter-chip" data-app="terrain3d">Terrain3D</button>
  </div>

  <div class="result-count" id="resultCount" style="display:none">
    Showing <strong id="resultNum">0</strong> export<span id="resultPlural">s</span>
  </div>

  <div id="exportContent">
    <!-- skeleton while loading -->
    <div class="export-grid" id="skeletonGrid">
      <div class="skeleton" style="height:200px;border-radius:12px"></div>
      <div class="skeleton" style="height:200px;border-radius:12px"></div>
      <div class="skeleton" style="height:200px;border-radius:12px"></div>
    </div>
  </div>
</main>

<script>
(function () {
  const API_URL = window.SM3D_CONFIG?.API_URL || 'https://api.spaceman3d.com';

  const APP_LABELS = {
    cookie: 'Cookie Cutter',
    terrain3d: 'Terrain3D',
  };

  const APP_URLS = {
    cookie: window.SM3D_CONFIG?.COOKIE_APP_URL || 'https://cookie.spaceman3d.com',
    terrain3d: window.SM3D_CONFIG?.TERRAIN_APP_URL || 'https://terrain3d.spaceman3d.com',
  };

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  // ── Auth guard ──────────────────────────────────────────────────────────
  const accessToken = localStorage.getItem('access_token');
  if (!accessToken) {
    window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
  }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('access_token')}` };
  }

  async function apiFetch(path, options = {}) {
    const res = await fetch(`${API_URL}${path}`, { headers: authHeaders(), ...options });
    if (res.status === 401) {
      const userId = localStorage.getItem('user_id');
      const refreshToken = localStorage.getItem('refresh_token');
      if (!userId || !refreshToken) { redirectLogin(); return null; }
      const r = await fetch(`${API_URL}/auth/refresh`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, refreshToken }),
      });
      if (!r.ok) { redirectLogin(); return null; }
      const { accessToken: newAccess, refreshToken: newRefresh } = await r.json();
      localStorage.setItem('access_token', newAccess);
      localStorage.setItem('refresh_token', newRefresh);
      return fetch(`${API_URL}${path}`, { headers: authHeaders(), ...options });
    }
    return res;
  }

  function redirectLogin() {
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');
    localStorage.removeItem('user_id');
    window.location.href = '/login.html';
  }

  // ── State ───────────────────────────────────────────────────────────────
  let allExports = [];
  let activeFilter = 'all';

  // ── Render ──────────────────────────────────────────────────────────────
  function fmtDate(dateStr) {
    if (!dateStr) return '—';
    return new Date(dateStr).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function statusBadge(status) {
    const s = (status || 'completed').toLowerCase();
    const label = s.charAt(0).toUpperCase() + s.slice(1);
    return `<span class="export-status status-${s}">
      <span class="status-dot ${s === 'processing' ? 'status-processing' : ''}"></span>
      ${esc(label)}
    </span>`;
  }

  function renderCard(exp) {
    const appId = (exp.appId || 'unknown').toLowerCase();
    const appLabel = APP_LABELS[appId] || esc(exp.appId) || 'Unknown App';
    const badgeClass = APP_LABELS[appId] ? `app-${appId}` : 'app-unknown';
    const name = exp.fileName || exp.name || `Export #${esc(exp.id)}`;
    const dims = exp.metadata?.dims;
    const dimsStr = dims
      ? `${dims.cutterSize}mm × ${dims.cutterHeight}mm`
      : exp.metadata?.resolution
        ? `Resolution: ${esc(exp.metadata.resolution)}`
        : null;

    // Action buttons
    let actions = '';
    if (exp.downloadUrl) {
      actions += `<a class="btn-download" href="${esc(exp.downloadUrl)}" download>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </a>`;
    }
    // Cookie Cutter: link back to app so user can re-download from IndexedDB
    if (appId === 'cookie') {
      const appUrl = esc(APP_URLS.cookie);
      actions += `<a class="btn-open" href="${appUrl}" target="_blank" rel="noopener">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open App
      </a>`;
    } else if (appId === 'terrain3d') {
      const appUrl = esc(APP_URLS.terrain3d);
      actions += `<a class="btn-open" href="${appUrl}" target="_blank" rel="noopener">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open App
      </a>`;
    }
    if (!actions) {
      actions = `<button class="btn-download" disabled>No Download</button>`;
    }

    return `
      <div class="export-card app-${appId}">
        <div class="export-card-header">
          <span class="export-app-badge ${badgeClass}">${esc(appLabel)}</span>
          ${statusBadge(exp.status)}
        </div>
        <div class="export-name">${esc(name)}</div>
        <div class="export-meta">
          <div class="export-meta-row">
            <span class="export-meta-label">Created</span>
            <span class="export-meta-value">${fmtDate(exp.createdAt)}</span>
          </div>
          ${dimsStr ? `<div class="export-meta-row">
            <span class="export-meta-label">Specs</span>
            <span class="export-meta-value">${esc(dimsStr)}</span>
          </div>` : ''}
          ${exp.fileSize ? `<div class="export-meta-row">
            <span class="export-meta-label">Size</span>
            <span class="export-meta-value">${esc(exp.fileSize)}</span>
          </div>` : ''}
        </div>
        <div class="export-actions">${actions}</div>
      </div>
    `;
  }

  function renderList(exports) {
    const content = document.getElementById('exportContent');
    const countEl = document.getElementById('resultCount');
    const numEl = document.getElementById('resultNum');
    const pluralEl = document.getElementById('resultPlural');

    if (!exports.length) {
      countEl.style.display = 'none';
      content.innerHTML = `
        <div class="state-panel">
          <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <h3>${activeFilter === 'all' ? 'No exports yet' : 'No exports for this app'}</h3>
          <p>${activeFilter === 'all'
            ? 'Generate your first file in Cookie Cutter or Terrain3D.'
            : 'Try switching to All Apps or create something new.'}</p>
          ${activeFilter === 'all' ? `<a href="/dashboard.html">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            Go to Dashboard
          </a>` : ''}
        </div>`;
      return;
    }

    numEl.textContent = exports.length;
    pluralEl.textContent = exports.length === 1 ? '' : 's';
    countEl.style.display = 'block';
    content.innerHTML = `<div class="export-grid">${exports.map(renderCard).join('')}</div>`;
  }

  function applyFilter() {
    const filtered = activeFilter === 'all'
      ? allExports
      : allExports.filter((e) => (e.appId || '').toLowerCase() === activeFilter);
    renderList(filtered);
  }

  // ── Filter chips ────────────────────────────────────────────────────────
  document.getElementById('filterBar').addEventListener('click', (e) => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;
    document.querySelectorAll('.filter-chip').forEach((c) => c.classList.remove('active'));
    chip.classList.add('active');
    activeFilter = chip.dataset.app;
    applyFilter();
  });

  // ── Load data ───────────────────────────────────────────────────────────
  async function load() {
    const res = await apiFetch('/exports');
    if (!res) return;

    if (!res.ok) {
      document.getElementById('exportContent').innerHTML = `
        <div class="state-panel">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <h3>Could not load exports</h3>
          <p>Please try again or check back later.</p>
        </div>`;
      return;
    }

    const data = await res.json();
    allExports = Array.isArray(data) ? data : (data.exports || []);

    // Sort newest first
    allExports.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    applyFilter();
  }

  load();
})();
</script>
</body>
</html>
