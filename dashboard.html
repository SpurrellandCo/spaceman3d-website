<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — SPACEMAN3D</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;800;900&family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <style>
    :root {
      --color-bg-deep:      #08080F;
      --color-bg-surface:   #0F1020;
      --color-bg-raised:    #161830;
      --color-blue-500:     #2979FF;
      --color-blue-400:     #5B9BFF;
      --color-blue-300:     #90BAFF;
      --color-white:        #FFFFFF;
      --color-fg1:          #E8EDF5;
      --color-fg2:          #B0BBCC;
      --color-fg3:          #8892A4;
      --color-border:       #1E2040;
      --color-border-strong:#262850;
      --color-success:      #22D3A4;
      --color-warning:      #FBBF24;
      --glow-sm:            0 0 12px rgba(41,121,255,0.25);
      --font-display:       'Orbitron', sans-serif;
      --font-body:          'Inter', sans-serif;
      --font-mono:          'Space Mono', monospace;
      --radius-sm:          6px;
      --radius-md:          12px;
      --radius-full:        9999px;
      --transition-fast:    150ms ease-out;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { min-height: 100vh; }
    body {
      background: var(--color-bg-deep);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      color: var(--color-fg1);
    }

    /* ── HEADER ── */
    .header {
      height: 64px;
      background: rgba(8,8,15,0.9);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .header-logo img { width: 28px; height: 28px; filter: drop-shadow(0 0 8px rgba(41,121,255,0.5)); }
    .header-wordmark {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 800;
      color: var(--color-white);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .header-wordmark span { color: var(--color-blue-500); }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .header-user { font-size: 13px; color: var(--color-fg3); }
    .btn-outline {
      padding: 7px 16px;
      border-radius: var(--radius-full);
      border: 1px solid var(--color-border-strong);
      background: transparent;
      color: var(--color-fg2);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color var(--transition-fast), color var(--transition-fast);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }
    .btn-outline:hover { border-color: var(--color-blue-500); color: var(--color-blue-400); }

    /* ── MAIN LAYOUT ── */
    .main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .page-greeting {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .page-greeting span { color: var(--color-blue-400); }
    .page-sub { font-size: 14px; color: var(--color-fg3); margin-bottom: 40px; }

    /* ── SECTION ── */
    .section { margin-bottom: 40px; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }
    .section-title {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-fg3);
    }
    .section-link {
      font-size: 12px;
      color: var(--color-blue-400);
      text-decoration: none;
      font-weight: 600;
    }
    .section-link:hover { text-decoration: underline; }

    /* ── APP GRID ── */
    .app-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .app-card {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      padding: 24px;
      text-decoration: none;
      display: block;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
      position: relative;
      overflow: hidden;
    }
    .app-card:hover {
      border-color: var(--color-blue-500);
      box-shadow: var(--glow-sm);
    }
    .app-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--color-blue-600), var(--color-blue-400));
      opacity: 0;
      transition: opacity var(--transition-fast);
    }
    .app-card:hover::before { opacity: 1; }
    .app-icon {
      width: 44px;
      height: 44px;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 8px rgba(41,121,255,0.4));
    }
    .app-name {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      color: var(--color-fg1);
      letter-spacing: 0.04em;
      margin-bottom: 4px;
    }
    .app-desc { font-size: 13px; color: var(--color-fg3); margin-bottom: 14px; }
    .app-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .app-badge.free {
      background: rgba(136,146,164,0.1);
      border: 1px solid rgba(136,146,164,0.2);
      color: var(--color-fg3);
    }
    .app-badge.premium {
      background: rgba(41,121,255,0.12);
      border: 1px solid rgba(41,121,255,0.3);
      color: var(--color-blue-400);
    }
    .app-badge.pro {
      background: rgba(34,211,164,0.1);
      border: 1px solid rgba(34,211,164,0.25);
      color: var(--color-success);
    }

    /* ── ACCOUNT CARD ── */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .info-card {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      padding: 20px 24px;
    }
    .info-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-fg3);
      margin-bottom: 6px;
    }
    .info-value {
      font-size: 15px;
      font-weight: 600;
      color: var(--color-fg1);
    }
    .info-value.mono { font-family: var(--font-mono); font-size: 13px; }

    /* ── BILLING CARD ── */
    .billing-card {
      background: var(--color-bg-surface);
      border: 1px solid var(--color-border-strong);
      border-radius: var(--radius-md);
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .billing-info { flex: 1; min-width: 200px; }
    .billing-title { font-size: 15px; font-weight: 600; color: var(--color-fg1); margin-bottom: 4px; }
    .billing-sub { font-size: 13px; color: var(--color-fg3); }
    .btn-primary {
      padding: 10px 22px;
      background: var(--color-blue-500);
      border: none;
      border-radius: var(--radius-md);
      color: var(--color-white);
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background var(--transition-fast);
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--color-blue-400); }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--color-bg-raised) 25%, var(--color-bg-surface) 50%, var(--color-bg-raised) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: var(--radius-sm);
      height: 16px;
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Empty state */
    .empty { text-align: center; padding: 40px; color: var(--color-fg3); font-size: 14px; }
  </style>
</head>
<body>

<header class="header">
  <a href="/" class="header-logo">
    <img src="assets/spaceman-logo.png" alt="Spaceman3D">
    <span class="header-wordmark">SPACEMAN<span>3D</span></span>
  </a>
  <div class="header-right">
    <span class="header-user" id="header-email"></span>
    <a href="/exports.html" class="btn-outline">Exports</a>
    <a href="/orders.html" class="btn-outline">Orders</a>
    <button class="btn-outline" id="btn-logout">Sign Out</button>
  </div>
</header>

<main class="main">
  <div class="page-greeting">Mission Control, <span id="greeting-name">Commander</span></div>
  <p class="page-sub">Your Spaceman3D command center.</p>

  <!-- App Launcher -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Your Apps</span>
    </div>
    <div class="app-grid" id="app-grid">
      <div class="skeleton" style="height:160px;border-radius:12px"></div>
      <div class="skeleton" style="height:160px;border-radius:12px"></div>
    </div>
  </div>

  <!-- Account Info -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Account</span>
      <a href="/settings.html" class="section-link">Edit profile</a>
    </div>
    <div class="info-grid" id="account-grid">
      <div class="skeleton" style="height:80px;border-radius:12px"></div>
      <div class="skeleton" style="height:80px;border-radius:12px"></div>
      <div class="skeleton" style="height:80px;border-radius:12px"></div>
    </div>
  </div>

  <!-- Recent Exports -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Recent Exports</span>
      <a href="/exports.html" class="section-link">View all exports</a>
    </div>
    <div id="exports-preview">
      <div class="skeleton" style="height:64px;border-radius:12px;margin-bottom:8px"></div>
      <div class="skeleton" style="height:64px;border-radius:12px"></div>
    </div>
  </div>

  <!-- Billing -->
  <div class="section">
    <div class="section-header">
      <span class="section-title">Billing</span>
      <a href="/orders.html" class="section-link">View orders</a>
    </div>
    <div class="billing-card" id="billing-card">
      <div class="skeleton" style="height:60px;width:60%"></div>
    </div>
  </div>
</main>

<script>
(function () {
  const API_URL = window.SM3D_CONFIG?.API_URL || 'https://api.spaceman3d.com';

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function safeUrl(url) {
    const s = String(url || '');
    return /^https?:\/\//i.test(s) ? s : '#';
  }

  // App descriptions (static — not from API)
  const APP_META = {
    cookie: {
      icon: 'assets/cookie-cutter-logo.png',
      desc: 'Design and generate custom cookie cutters in seconds.',
    },
    terrain3d: {
      icon: 'assets/terrain3d-logo.png',
      desc: 'Create 3D topographic maps from real-world elevation data.',
    },
    main: {
      icon: 'assets/spaceman-logo.png',
      desc: 'The Spaceman3D platform hub.',
    },
  };

  // ── Auth guard ────────────────────────────────────
  const accessToken = localStorage.getItem('access_token');
  if (!accessToken) {
    window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.href);
  }

  function authHeaders() {
    return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${localStorage.getItem('access_token')}` };
  }

  // ── Refresh on 401 ────────────────────────────────
  async function apiFetch(path, options = {}) {
    const res = await fetch(`${API_URL}${path}`, { headers: authHeaders(), ...options });
    if (res.status === 401) {
      const userId = localStorage.getItem('user_id');
      const refreshToken = localStorage.getItem('refresh_token');
      if (!userId || !refreshToken) { redirectLogin(); return null; }
      const r = await fetch(`${API_URL}/auth/refresh`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, refreshToken }),
      });
      if (!r.ok) { redirectLogin(); return null; }
      const { accessToken, refreshToken: newRefresh } = await r.json();
      localStorage.setItem('access_token', accessToken);
      localStorage.setItem('refresh_token', newRefresh);
      return fetch(`${API_URL}${path}`, { headers: authHeaders(), ...options });
    }
    return res;
  }

  function redirectLogin() {
    localStorage.removeItem('access_token');
    localStorage.removeItem('refresh_token');
    localStorage.removeItem('user_id');
    window.location.href = '/login.html';
  }

  function tierBadge(tier) {
    const t = (tier || 'free').toLowerCase();
    if (t === 'pro') return `<span class="app-badge pro">Pro</span>`;
    if (t === 'premium') return `<span class="app-badge premium">Premium</span>`;
    return `<span class="app-badge free">Free</span>`;
  }

  // ── Load data ─────────────────────────────────────
  async function load() {
    const [userRes, subsRes, appsRes] = await Promise.all([
      apiFetch('/user/me'),
      apiFetch('/subscriptions'),
      apiFetch('/apps'),
    ]);
    if (!userRes || !subsRes || !appsRes) return;

    const user = await userRes.json();
    const subs = await subsRes.json();
    const apps = await appsRes.json();

    // Header
    document.getElementById('header-email').textContent = user.email;
    const name = user.firstName || user.email.split('@')[0];
    document.getElementById('greeting-name').textContent = name;

    // Build subscription map: appId → tier
    const subMap = {};
    (subs || []).forEach((s) => {
      if (s.status === 'active' || s.status === 'trialing') subMap[s.appId] = s.tier;
    });

    // App grid
    const grid = document.getElementById('app-grid');
    const filteredApps = (apps || []).filter((a) => a.isActive && a.appId !== 'main');
    if (!filteredApps.length) {
      grid.innerHTML = '<div class="empty">No apps available yet.</div>';
    } else {
      grid.innerHTML = filteredApps.map((app) => {
        const meta = APP_META[app.appId] || {};
        const tier = subMap[app.appId] || 'free';
        return `
          <a class="app-card" href="${esc(safeUrl(app.baseUrl))}" target="_blank" rel="noopener">
            <img class="app-icon" src="${meta.icon || 'assets/spaceman-logo.png'}" alt="${esc(app.name)}">
            <div class="app-name">${esc(app.name)}</div>
            <div class="app-desc">${meta.desc || ''}</div>
            ${tierBadge(tier)}
          </a>`;
      }).join('');
    }

    // Account info
    document.getElementById('account-grid').innerHTML = `
      <div class="info-card">
        <div class="info-label">Name</div>
        <div class="info-value">${esc([user.firstName, user.lastName].filter(Boolean).join(' ') || '—')}</div>
      </div>
      <div class="info-card">
        <div class="info-label">Email</div>
        <div class="info-value mono">${esc(user.email)}</div>
      </div>
      <div class="info-card">
        <div class="info-label">Role</div>
        <div class="info-value">${esc(user.role || 'user')}</div>
      </div>
      <div class="info-card">
        <div class="info-label">Member since</div>
        <div class="info-value">${new Date(user.createdAt).toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}</div>
      </div>
    `;

    // Billing
    const activeSubs = (subs || []).filter((s) => s.status === 'active' || s.status === 'trialing');
    const billingCard = document.getElementById('billing-card');
    if (activeSubs.length) {
      const nextRenewal = activeSubs.map((s) => new Date(s.currentPeriodEnd)).sort((a, b) => a - b)[0];
      billingCard.innerHTML = `
        <div class="billing-info">
          <div class="billing-title">${activeSubs.length} Active Subscription${activeSubs.length > 1 ? 's' : ''}</div>
          <div class="billing-sub">Next renewal: ${nextRenewal.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</div>
        </div>
        <button class="btn-primary" id="btn-portal">Manage Billing</button>
      `;
    } else {
      billingCard.innerHTML = `
        <div class="billing-info">
          <div class="billing-title">No active subscriptions</div>
          <div class="billing-sub">Upgrade to unlock premium features across all apps.</div>
        </div>
        <a href="/pricing.html" class="btn-primary">View Plans</a>
      `;
    }

    // Billing portal button
    const portalBtn = document.getElementById('btn-portal');
    if (portalBtn) {
      portalBtn.addEventListener('click', async () => {
        portalBtn.disabled = true;
        portalBtn.textContent = 'Loading…';
        try {
          const r = await apiFetch('/stripe/create-portal-session', { method: 'POST' });
          const data = await r.json();
          if (data.url) window.location.href = data.url;
        } catch {
          portalBtn.textContent = 'Manage Billing';
          portalBtn.disabled = false;
        }
      });
    }

    // Recent exports preview (fire-and-forget, not critical)
    loadExportsPreview();

    // Admin link (if admin)
    if (user.role === 'admin' || user.role === 'super_admin') {
      const headerRight = document.querySelector('.header-right');
      const adminLink = document.createElement('a');
      adminLink.href = '/admin/';
      adminLink.className = 'btn-outline';
      adminLink.textContent = 'Admin';
      headerRight.insertBefore(adminLink, headerRight.firstChild);
    }
  }

  // ── Recent exports preview ────────────────────────
  async function loadExportsPreview() {
    const el = document.getElementById('exports-preview');
    if (!el) return;
    try {
      const res = await apiFetch('/exports?limit=3');
      if (!res || !res.ok) {
        el.innerHTML = '<div class="empty">Could not load exports.</div>';
        return;
      }
      const data = await res.json();
      const exports = (Array.isArray(data) ? data : (data.exports || [])).slice(0, 3);
      if (!exports.length) {
        el.innerHTML = '<div class="empty">No exports yet — generate something in Cookie Cutter or Terrain3D.</div>';
        return;
      }
      const APP_LABELS = { cookie: 'Cookie Cutter', terrain3d: 'Terrain3D' };
      el.innerHTML = exports.map((exp) => {
        const label = APP_LABELS[(exp.appId || '').toLowerCase()] || esc(exp.appId) || 'App';
        const name = exp.fileName || exp.name || `Export #${esc(exp.id)}`;
        const date = exp.createdAt ? new Date(exp.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '—';
        return `
          <div style="background:var(--color-bg-surface);border:1px solid var(--color-border-strong);border-radius:var(--radius-md);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:8px;">
            <div style="display:flex;align-items:center;gap:12px;min-width:0;">
              <span style="font-size:11px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:var(--color-blue-400);white-space:nowrap;">${esc(label)}</span>
              <span style="font-size:13px;font-weight:600;color:var(--color-fg1);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(name)}</span>
            </div>
            <span style="font-size:12px;color:var(--color-fg3);white-space:nowrap;">${date}</span>
          </div>`;
      }).join('') + `<a href="/exports.html" style="display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--color-blue-400);text-decoration:none;font-weight:600;margin-top:4px;">View all exports →</a>`;
    } catch {
      el.innerHTML = '';
    }
  }

  // ── Logout ────────────────────────────────────────
  document.getElementById('btn-logout').addEventListener('click', async () => {
    try {
      await fetch(`${API_URL}/auth/logout`, {
        method: 'POST',
        headers: authHeaders(),
      });
    } finally {
      localStorage.removeItem('access_token');
      localStorage.removeItem('refresh_token');
      localStorage.removeItem('user_id');
      window.location.href = '/';
    }
  });

  load();
})();
</script>
</body>
</html>
